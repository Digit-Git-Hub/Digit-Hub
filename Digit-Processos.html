<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digit Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563EB;--dark:#1E3A8A;--cyan:#0891B2;
  --bg:#F0F4FF;--bg2:#E2E8F0;--bg3:#CBD5E1;
  --text:#1E293B;--text2:#475569;--text3:#94A3B8;
  --border:rgba(37,99,235,0.15);--border2:rgba(37,99,235,0.35);
  --white:#fff;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* TOOLBAR */
#tb{display:flex;align-items:center;gap:5px;padding:7px 12px;background:linear-gradient(135deg,#1E3A8A 0%,#2563EB 60%,#0EA5E9 100%);flex-shrink:0;box-shadow:0 2px 14px rgba(37,99,235,0.4);flex-wrap:wrap}
.t-logo{display:flex;align-items:center;gap:5px;margin-right:6px}
.t-logo-box{background:white;color:#1E3A8A;border-radius:5px;padding:2px 8px;font-size:13px;font-weight:900;letter-spacing:-.03em}
.t-logo-text{color:rgba(255,255,255,.88);font-size:13px;font-weight:600}
.tsep{width:1px;height:20px;background:rgba(255,255,255,.22);margin:0 3px}
.tlabel{font-size:9.5px;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.tbtn{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border:1px solid rgba(255,255,255,.22);border-radius:6px;background:rgba(255,255,255,.1);color:#fff;font-size:11.5px;cursor:pointer;transition:all .12s;white-space:nowrap;font-family:inherit}
.tbtn:hover{background:rgba(255,255,255,.24);border-color:rgba(255,255,255,.5)}
.tbtn.active{background:rgba(255,255,255,.95);border-color:white;font-weight:700;color:#1E3A8A}
.tbtn.danger{color:rgba(255,180,180,.9)}
.tbtn svg{width:13px;height:13px;flex-shrink:0}
#savebadge{margin-left:auto;font-size:10px;padding:2px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.18);color:rgba(255,255,255,.6);white-space:nowrap;transition:all .4s}
#savebadge.ok{color:rgba(180,255,180,.9);border-color:rgba(180,255,180,.3)}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sb{width:148px;border-right:1px solid var(--border);padding:8px 7px;overflow-y:auto;background:var(--white);flex-shrink:0;box-shadow:2px 0 8px rgba(37,99,235,.06)}
#sb h3{font-size:9px;font-weight:700;color:var(--text3);margin:9px 0 5px;text-transform:uppercase;letter-spacing:.06em}
#sb h3:first-child{margin-top:0}
.sitem{padding:6px 8px;border-radius:7px;font-size:11.5px;cursor:pointer;border:1px solid var(--border);margin-bottom:3px;background:var(--bg2);display:flex;align-items:center;gap:7px;color:var(--text);transition:all .13s;position:relative}
.sitem:hover{border-color:var(--blue);background:rgba(37,99,235,.07);transform:translateX(2px)}
.sitem:active{transform:translateX(1px) scale(.98)}
.sitem.sel-type{border-color:var(--blue);background:rgba(37,99,235,.12);font-weight:600}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sitem-hint{position:absolute;right:6px;font-size:9px;color:var(--text3);opacity:0;transition:opacity .15s}
.sitem:hover .sitem-hint{opacity:1}

/* CANVAS */
#cw{flex:1;overflow:hidden;position:relative;background:#F5F8FF;background-image:radial-gradient(circle,rgba(37,99,235,.14) 1px,transparent 1px);background-size:24px 24px;cursor:crosshair}
#cw.panning{cursor:grabbing}
#cw.selecting{cursor:default}
#cv{position:absolute;transform-origin:0 0;will-change:transform}
svg#dg{overflow:visible;display:block}

/* PROPS PANEL */
#panel{position:absolute;bottom:14px;right:14px;width:192px;background:var(--white);border:1px solid var(--border2);border-top:3px solid var(--blue);border-radius:10px;padding:13px;display:none;z-index:200;box-shadow:0 4px 24px rgba(37,99,235,.16)}
#panel h4{font-size:9px;font-weight:700;color:var(--text3);margin-bottom:11px;text-transform:uppercase;letter-spacing:.06em}
.pr{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
.pr label{font-size:10px;color:var(--text2);font-weight:600}
.pr input,.pr select{padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:11.5px;background:var(--bg2);color:var(--text);font-family:inherit;outline:none;transition:border-color .12s}
.pr input:focus,.pr select:focus{border-color:var(--blue)}
.dbtn{width:100%;margin-top:5px;padding:6px;border:1px solid #fca5a5;border-radius:6px;background:transparent;color:#b91c1c;font-size:11px;cursor:pointer;font-family:inherit;transition:background .12s}
.dbtn:hover{background:#fef2f2}

/* BOTTOM STATUS */
#status{position:absolute;bottom:14px;left:14px;font-size:10.5px;color:#64748B;pointer-events:none;font-weight:500}
#hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;color:#1E3A8A;pointer-events:none;background:rgba(255,255,255,.95);border:1px solid rgba(37,99,235,.2);border-radius:20px;padding:4px 16px;white-space:nowrap;transition:opacity .6s;font-weight:500}

/* EDGE LABELS */
.elabel{font-size:10px;fill:#64748B;pointer-events:none}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="tb">
  <div class="t-logo">
    <span class="t-logo-box">digit</span>
    <span class="t-logo-text">Hub</span>
  </div>
  <div class="tsep"></div>
  <span class="tlabel">Modo</span>
  <button class="tbtn active" id="btn-add" onclick="setMode('add')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Adicionar
  </button>
  <button class="tbtn" id="btn-move" onclick="setMode('move')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M12 12v.01"/><path d="M3 12h18M12 3v18"/></svg>Mover
  </button>
  <button class="tbtn" id="btn-connect" onclick="setMode('connect')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>Ligar [C]
  </button>
  <button class="tbtn" onclick="addLane()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18"/></svg>+ Lane
  </button>
  <div class="tsep"></div>
  <span class="tlabel">Vista</span>
  <button class="tbtn" onclick="zoomBy(-.15)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M8 11h6"/></svg></button>
  <button class="tbtn" onclick="zoomBy(.15)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M11 8v6M8 11h6"/></svg></button>
  <button class="tbtn" onclick="resetView()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"/></svg></button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="doUndo()" title="Ctrl+Z"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9h13a5 5 0 0 1 0 10H7"/><polyline points="3 5 3 9 7 9"/></svg></button>
  <button class="tbtn" onclick="doRedo()" title="Ctrl+Y"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 9H8a5 5 0 0 0 0 10h9"/><polyline points="21 5 21 9 17 9"/></svg></button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="loadDemo()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Demo</button>
  <button class="tbtn" onclick="doExport()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>SVG</button>
  <button class="tbtn danger" onclick="doClear()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Limpar</button>
  <span id="savebadge">sem alterações</span>
</div>

<!-- MAIN -->
<div id="main">
  <!-- SIDEBAR -->
  <div id="sb">
    <h3>Nós</h3>
    <div class="sitem" data-type="process" onclick="pickType('process')"><span class="sdot" style="background:#2563EB"></span>Processo<span class="sitem-hint">click</span></div>
    <div class="sitem" data-type="source" onclick="pickType('source')"><span class="sdot" style="background:#059669"></span>Fonte dados<span class="sitem-hint">click</span></div>
    <div class="sitem" data-type="storage" onclick="pickType('storage')"><span class="sdot" style="background:#7C3AED"></span>Armazém<span class="sitem-hint">click</span></div>
    <div class="sitem" data-type="model" onclick="pickType('model')"><span class="sdot" style="background:#D97706"></span>Modelo / AI<span class="sitem-hint">click</span></div>
    <div class="sitem" data-type="output" onclick="pickType('output')"><span class="sdot" style="background:#DC2626"></span>Output<span class="sitem-hint">click</span></div>
    <div class="sitem" data-type="event" onclick="pickType('event')"><span class="sdot" style="background:#16A34A"></span>Evento<span class="sitem-hint">click</span></div>
    <div class="sitem" data-type="api" onclick="pickType('api')"><span class="sdot" style="background:#0891B2"></span>API<span class="sitem-hint">click</span></div>
    <div class="sitem" data-type="decision" onclick="pickType('decision')"><span class="sdot" style="background:#64748B"></span>Decisão<span class="sitem-hint">click</span></div>
    <h3>Infra</h3>
    <div class="sitem" data-type="cloud" onclick="pickType('cloud')"><span class="sdot" style="background:#0E7490"></span>Cloud<span class="sitem-hint">click</span></div>
    <div class="sitem" data-type="queue" onclick="pickType('queue')"><span class="sdot" style="background:#4F46E5"></span>Fila / Queue<span class="sitem-hint">click</span></div>
    <div class="sitem" data-type="user" onclick="pickType('user')"><span class="sdot" style="background:#9333EA"></span>Utilizador<span class="sitem-hint">click</span></div>
  </div>

  <!-- CANVAS -->
  <div id="cw" onmousedown="cwMD(event)" onmousemove="cwMM(event)" onmouseup="cwMU(event)" onwheel="cwWheel(event)">
    <div id="cv">
      <svg id="dg" width="4000" height="3000">
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
          <marker id="arr-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>
        <g id="gL"></g>
        <g id="gE"></g>
        <g id="gN"></g>
        <g id="gP"></g>
        <g id="gT"></g>
      </svg>
    </div>
  </div>
</div>

<!-- PROPS PANEL -->
<div id="panel">
  <h4>Propriedades</h4>
  <div class="pr"><label>Etiqueta</label><input id="p-lbl" oninput="pLbl()"></div>
  <div class="pr"><label>Tipo</label>
    <select id="p-typ" onchange="pTyp()">
      <option value="process">Processo</option><option value="source">Fonte dados</option>
      <option value="storage">Armazém</option><option value="model">Modelo / AI</option>
      <option value="output">Output</option><option value="event">Evento</option>
      <option value="api">API</option><option value="decision">Decisão</option>
      <option value="cloud">Cloud</option><option value="queue">Fila / Queue</option>
      <option value="user">Utilizador</option>
    </select>
  </div>
  <div class="pr"><label>Sub-etiqueta</label><input id="p-sub" oninput="pSub()"></div>
  <button class="dbtn" onclick="delSel()">🗑 Apagar</button>
</div>

<div id="status">100%</div>
<div id="hint">← Clica num tipo de nó e depois clica no canvas para colocar</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const COLORS={process:'#2563EB',source:'#059669',storage:'#7C3AED',model:'#D97706',output:'#DC2626',event:'#16A34A',api:'#0891B2',decision:'#64748B',cloud:'#0E7490',queue:'#4F46E5',user:'#9333EA'};
const LABELS={process:'Processo',source:'Fonte dados',storage:'Armazém',model:'Modelo / AI',output:'Output',event:'Evento',api:'API',decision:'Decisão',cloud:'Cloud',queue:'Fila / Queue',user:'Utilizador'};
const SAVE_KEY='digit_hub_v2';
const MAX_UNDO=40;

// ── STATE ──────────────────────────────────────────────────
let S={nodes:[],edges:[],lanes:[],nid:1};
let V={x:60,y:60,sc:1};
let mode='add';          // 'add' | 'move' | 'connect'
let pickedType=null;     // type selected from sidebar
let drag=null,pan=null,conn=null;
let selN=null,selE=null;
let undoStack=[],redoStack=[];
let saveTimer=null;

// ── DOM ────────────────────────────────────────────────────
const cw=document.getElementById('cw');
const cv=document.getElementById('cv');
const svg=document.getElementById('dg');
const gL=document.getElementById('gL'),gE=document.getElementById('gE');
const gN=document.getElementById('gN'),gP=document.getElementById('gP'),gT=document.getElementById('gT');
const panel=document.getElementById('panel');
const statusEl=document.getElementById('status');
const badge=document.getElementById('savebadge');
const hintEl=document.getElementById('hint');

// ── VIEW ───────────────────────────────────────────────────
function applyView(){
  cv.style.transform=`translate(${V.x}px,${V.y}px) scale(${V.sc})`;
  statusEl.textContent=Math.round(V.sc*100)+'%';
}
function zoomBy(d,cx,cy){
  const r=cw.getBoundingClientRect();
  cx=cx??(r.width/2);cy=cy??(r.height/2);
  const old=V.sc;V.sc=Math.max(.1,Math.min(4,V.sc+d));
  const f=V.sc/old;V.x=cx-(cx-V.x)*f;V.y=cy-(cy-V.y)*f;
  applyView();
}
function resetView(){V.x=60;V.y=60;V.sc=1;applyView();}
function pt(e){
  const r=cw.getBoundingClientRect();
  return{x:(e.clientX-r.left-V.x)/V.sc,y:(e.clientY-r.top-V.y)/V.sc};
}

// ── SAVE ───────────────────────────────────────────────────
function snap(){return JSON.parse(JSON.stringify(S));}
function markDirty(){
  badge.textContent='● não guardado';badge.classList.remove('ok');
  clearTimeout(saveTimer);saveTimer=setTimeout(save,900);
}
function save(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({S,V}));badge.textContent='✓ guardado';badge.classList.add('ok');}
  catch(e){badge.textContent='⚠ erro';}
}
function loadSaved(){
  try{const d=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');if(d&&d.S){S=d.S;if(d.V)V=d.V;return true;}}catch(e){}
  return false;
}

// ── UNDO ───────────────────────────────────────────────────
function pushUndo(){undoStack.push(snap());if(undoStack.length>MAX_UNDO)undoStack.shift();redoStack=[];}
function doUndo(){if(!undoStack.length)return;redoStack.push(snap());S=undoStack.pop();renderAll();markDirty();}
function doRedo(){if(!redoStack.length)return;undoStack.push(snap());S=redoStack.pop();renderAll();markDirty();}

// ── SVG HELPERS ────────────────────────────────────────────
function mk(tag,a={}){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(a))el.setAttribute(k,v);
  return el;
}
function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}
function nc(n){return[n.x+(n.w||140)/2,n.y+(n.h||44)/2];}

// ── RENDER NODE ────────────────────────────────────────────
function renderNode(n){
  let g=document.getElementById('nd-'+n.id);
  if(!g){g=mk('g',{id:'nd-'+n.id});gN.appendChild(g);}
  else g.innerHTML='';
  const w=n.w||140,h=n.h||44,col=n.color||COLORS[n.type]||'#888';
  const isSel=selN===n.id;
  g.setAttribute('transform',`translate(${n.x},${n.y})`);
  let shape;
  if(n.type==='decision'){
    const hw=w/2,hh=h/2;
    shape=mk('polygon',{points:`${hw},0 ${w},${hh} ${hw},${h} 0,${hh}`,fill:hexA(col,.13),stroke:col,'stroke-width':isSel?2.5:1.2});
  }else{
    shape=mk('rect',{width:w,height:h,rx:8,fill:hexA(col,.13),stroke:col,'stroke-width':isSel?2.5:1.2});
  }
  if(isSel){shape.setAttribute('filter','drop-shadow(0 0 4px '+col+'66)');}
  g.appendChild(shape);
  const ty=n.sub?h/2-7:h/2;
  const lbl=mk('text',{x:w/2,y:ty,'text-anchor':'middle','dominant-baseline':'central',fill:col,'font-size':'12','font-weight':'600'});
  lbl.style.pointerEvents='none';lbl.textContent=n.label||'Nó';g.appendChild(lbl);
  if(n.sub){
    const sub=mk('text',{x:w/2,y:h/2+9,'text-anchor':'middle','dominant-baseline':'central',fill:'#64748B','font-size':'10'});
    sub.style.pointerEvents='none';sub.textContent=n.sub;g.appendChild(sub);
  }
  g.style.cursor=mode==='connect'?'crosshair':mode==='move'?'grab':'pointer';
  g.onmousedown=e=>{e.stopPropagation();onNodeMD(e,n);};
  g.ondblclick=e=>{e.stopPropagation();onNodeDbl(n);};
}

// ── RENDER EDGE ────────────────────────────────────────────
function renderEdge(ed){
  let g=document.getElementById('ed-'+ed.id);
  if(!g){g=mk('g',{id:'ed-'+ed.id});gE.appendChild(g);}
  else g.innerHTML='';
  const src=S.nodes.find(n=>n.id===ed.src),dst=S.nodes.find(n=>n.id===ed.dst);
  if(!src||!dst)return;
  const[sx,sy]=nc(src),[dx,dy]=nc(dst),my=(sy+dy)/2;
  const col=ed.color||'#94A3B8',isSel=selE===ed.id;
  const p=mk('path',{d:`M${sx},${sy} C${sx},${my} ${dx},${my} ${dx},${dy}`,stroke:col,'stroke-width':isSel?2.5:1.5,fill:'none','marker-end':'url(#arr)',opacity:isSel?1:.7});
  p.style.cursor='pointer';
  p.onclick=e=>{e.stopPropagation();selectEdge(ed.id);};
  g.appendChild(p);
  if(ed.label){
    const t=mk('text',{x:(sx+dx)/2,y:my-8,'text-anchor':'middle','dominant-baseline':'central',fill:'#64748B','font-size':'10'});
    t.textContent=ed.label;g.appendChild(t);
  }
}

// ── RENDER LANE ────────────────────────────────────────────
function renderLane(l){
  let g=document.getElementById('ln-'+l.id);
  if(!g){g=mk('g',{id:'ln-'+l.id});gL.appendChild(g);}
  else g.innerHTML='';
  const bg=mk('rect',{x:l.x,y:l.y,width:l.w,height:l.h,rx:10,fill:l.fill||'rgba(37,99,235,0.05)',stroke:'rgba(37,99,235,0.18)','stroke-width':1});
  const hd=mk('rect',{x:l.x,y:l.y,width:l.w,height:28,rx:10,fill:'white',stroke:'rgba(37,99,235,0.18)','stroke-width':1});
  const lb=mk('text',{x:l.x+l.w/2,y:l.y+14,'text-anchor':'middle','dominant-baseline':'central',fill:'#475569','font-size':'11','font-weight':'700'});
  lb.textContent=l.label||'Fase';
  g.appendChild(bg);g.appendChild(hd);g.appendChild(lb);
  g.style.cursor='move';
  const lmd=e=>{e.stopPropagation();const p=pt(e);drag={id:l.id,type:'lane',ox:p.x-l.x,oy:p.y-l.y,moved:false};};
  [bg,hd,lb].forEach(el=>el.onmousedown=lmd);
  g.ondblclick=()=>{const v=prompt('Nome da lane:',l.label);if(v!==null){pushUndo();l.label=v;renderLane(l);markDirty();}};
}

// ── RENDER ALL ─────────────────────────────────────────────
function renderAll(){
  gL.innerHTML='';gE.innerHTML='';gN.innerHTML='';gP.innerHTML='';
  S.lanes.forEach(renderLane);
  S.edges.forEach(renderEdge);
  S.nodes.forEach(renderNode);
  if(mode==='connect')renderPorts();
}

// ── PORTS ──────────────────────────────────────────────────
function clearPorts(){gP.innerHTML='';}
function renderPorts(){
  clearPorts();
  S.nodes.forEach(n=>{
    const w=n.w||140,h=n.h||44;
    [[w/2,0],[w,h/2],[w/2,h],[0,h/2]].forEach(([px,py])=>{
      const c=mk('circle',{cx:n.x+px,cy:n.y+py,r:6,'fill':'white','stroke':'#2563EB','stroke-width':'1.5','cursor':'crosshair'});
      c.onmousedown=e=>{e.stopPropagation();conn={srcId:n.id,x:n.x+px,y:n.y+py};};
      gP.appendChild(c);
    });
  });
}

// ── MODE ───────────────────────────────────────────────────
function setMode(m){
  mode=m;pickedType=null;
  document.querySelectorAll('.tbtn[id^="btn-"]').forEach(b=>b.classList.toggle('active',b.id==='btn-'+m));
  document.querySelectorAll('.sitem').forEach(el=>el.classList.remove('sel-type'));
  clearPorts();gT.innerHTML='';conn=null;
  if(m==='connect'){renderPorts();cw.style.cursor='crosshair';}
  else if(m==='move'){cw.style.cursor='grab';}
  else{cw.style.cursor='crosshair';}
  // update hint
  if(m==='add')hintEl.textContent='← Clica num tipo de nó e depois clica no canvas para colocar';
  else if(m==='move')hintEl.textContent='Clica e arrasta para mover nós · Alt+Drag para mover canvas';
  else hintEl.textContent='Clica nos pontos azuis para ligar nós';
  hintEl.style.opacity='1';
}

// ── PICK TYPE FROM SIDEBAR ─────────────────────────────────
function pickType(type){
  if(mode!=='add')setMode('add');
  pickedType=type;
  document.querySelectorAll('.sitem').forEach(el=>el.classList.toggle('sel-type',el.dataset.type===type));
  hintEl.textContent='Tipo "'+LABELS[type]+'" seleccionado → clica no canvas para colocar';
  hintEl.style.opacity='1';
}

// ── ADD NODE AT POINT ──────────────────────────────────────
function addNodeAt(x,y){
  if(!pickedType)return false;
  pushUndo();
  const n={id:'n'+(S.nid++),type:pickedType,color:COLORS[pickedType],label:LABELS[pickedType],x:x-70,y:y-22,w:140,h:44};
  S.nodes.push(n);renderNode(n);
  if(mode==='connect')renderPorts();
  markDirty();
  hintEl.textContent='Nó colocado! Clica novamente para mais ou escolhe outro tipo.';
  return true;
}

// ── NODE INTERACTIONS ──────────────────────────────────────
function onNodeMD(e,n){
  if(mode==='connect'){
    if(conn&&conn.srcId!==n.id){
      pushUndo();
      const ed={id:'e'+(S.nid++),src:conn.srcId,dst:n.id,color:'#94A3B8'};
      S.edges.push(ed);renderEdge(ed);conn=null;gT.innerHTML='';markDirty();
    }
    return;
  }
  if(mode==='move'||mode==='add'){
    selectNode(n.id);
    const p=pt(e);
    drag={id:n.id,type:'node',ox:p.x-n.x,oy:p.y-n.y,moved:false};
  }
}
function onNodeDbl(n){
  const v=prompt('Etiqueta:',n.label);
  if(v!==null){pushUndo();n.label=v;renderNode(n);markDirty();}
}

// ── SELECTION ──────────────────────────────────────────────
function selectNode(id){
  selN=id;selE=null;
  const n=S.nodes.find(x=>x.id===id);
  if(n){
    panel.style.display='block';
    document.getElementById('p-lbl').value=n.label||'';
    document.getElementById('p-typ').value=n.type||'process';
    document.getElementById('p-sub').value=n.sub||'';
  }
  S.nodes.forEach(renderNode);S.edges.forEach(renderEdge);
}
function selectEdge(id){
  selE=id;selN=null;
  const ed=S.edges.find(x=>x.id===id);
  panel.style.display='block';
  document.getElementById('p-lbl').value=ed?.label||'';
  document.getElementById('p-sub').value='';
  S.nodes.forEach(renderNode);S.edges.forEach(renderEdge);
}
function clearSel(){
  selN=null;selE=null;panel.style.display='none';
  S.nodes.forEach(renderNode);S.edges.forEach(renderEdge);
}

// ── PROPS ──────────────────────────────────────────────────
function pLbl(){const v=document.getElementById('p-lbl').value;if(selN){const n=S.nodes.find(x=>x.id===selN);if(n){n.label=v;renderNode(n);markDirty();}}if(selE){const e=S.edges.find(x=>x.id===selE);if(e){e.label=v;renderEdge(e);markDirty();}}}
function pTyp(){const v=document.getElementById('p-typ').value;if(selN){const n=S.nodes.find(x=>x.id===selN);if(n){pushUndo();n.type=v;n.color=COLORS[v];renderNode(n);markDirty();}}}
function pSub(){const v=document.getElementById('p-sub').value;if(selN){const n=S.nodes.find(x=>x.id===selN);if(n){n.sub=v;renderNode(n);markDirty();}}}
function delSel(){
  pushUndo();
  if(selN){S.nodes=S.nodes.filter(x=>x.id!==selN);S.edges=S.edges.filter(x=>x.src!==selN&&x.dst!==selN);}
  if(selE){S.edges=S.edges.filter(x=>x.id!==selE);}
  clearSel();renderAll();markDirty();
}

// ── CANVAS MOUSE EVENTS ────────────────────────────────────
function cwMD(e){
  // Pan with Alt or middle button
  if(e.button===1||(e.button===0&&e.altKey)){
    e.preventDefault();
    pan={mx:e.clientX,my:e.clientY,vx:V.x,vy:V.y};
    cw.classList.add('panning');
    return;
  }
  // Click on empty canvas
  if(e.target===cw||e.target===cv||e.target===svg||e.target.id==='dg'){
    if(mode==='add'&&pickedType){
      addNodeAt(pt(e).x,pt(e).y);
    }else{
      clearSel();
      if(conn){conn=null;gT.innerHTML='';}
    }
  }
}

function cwMM(e){
  if(pan){
    V.x=pan.vx+(e.clientX-pan.mx);V.y=pan.vy+(e.clientY-pan.my);
    applyView();return;
  }
  if(drag){
    const p=pt(e);
    if(drag.type==='node'){
      const n=S.nodes.find(x=>x.id===drag.id);
      if(n){
        if(!drag.moved){pushUndo();drag.moved=true;}
        n.x=p.x-drag.ox;n.y=p.y-drag.oy;
        document.getElementById('nd-'+n.id)?.setAttribute('transform',`translate(${n.x},${n.y})`);
        S.edges.filter(ed=>ed.src===n.id||ed.dst===n.id).forEach(renderEdge);
        if(mode==='connect')renderPorts();
      }
    }else if(drag.type==='lane'){
      const l=S.lanes.find(x=>x.id===drag.id);
      if(l){
        if(!drag.moved){pushUndo();drag.moved=true;}
        l.x=p.x-drag.ox;l.y=p.y-drag.oy;renderLane(l);
      }
    }
    return;
  }
  if(conn){
    const p=pt(e);gT.innerHTML='';
    const path=mk('path',{d:`M${conn.x},${conn.y} C${conn.x},${(conn.y+p.y)/2} ${p.x},${(conn.y+p.y)/2} ${p.x},${p.y}`,stroke:'#2563EB','stroke-width':'1.5',fill:'none','stroke-dasharray':'6 4','marker-end':'url(#arr-b)'});
    gT.appendChild(path);
  }
}

function cwMU(e){
  cw.classList.remove('panning');
  if(drag&&drag.moved)markDirty();
  pan=null;drag=null;
}

function cwWheel(e){
  e.preventDefault();
  const r=cw.getBoundingClientRect();
  zoomBy(-e.deltaY*0.001,e.clientX-r.left,e.clientY-r.top);
}

// ── LANE ───────────────────────────────────────────────────
function addLane(){
  pushUndo();
  const l={id:'l'+(S.nid++),label:'Fase',x:80,y:80,w:300,h:440,fill:'rgba(37,99,235,0.05)'};
  S.lanes.push(l);renderLane(l);markDirty();
}

// ── EXPORT ─────────────────────────────────────────────────
function doExport(){
  const s=new XMLSerializer().serializeToString(svg);
  const b=new Blob([s],{type:'image/svg+xml'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='digit-hub.svg';a.click();
}

// ── CLEAR ──────────────────────────────────────────────────
function doClear(){
  if(!confirm('Limpar todo o diagrama?'))return;
  pushUndo();S={nodes:[],edges:[],lanes:[],nid:1};
  gL.innerHTML='';gE.innerHTML='';gN.innerHTML='';gP.innerHTML='';gT.innerHTML='';
  clearSel();panel.style.display='none';markDirty();
}

// ── KEYBOARD ───────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;
  if(e.key==='Delete'||e.key==='Backspace')delSel();
  if(e.key==='Escape'){clearSel();pickedType=null;document.querySelectorAll('.sitem').forEach(el=>el.classList.remove('sel-type'));conn=null;gT.innerHTML='';setMode('add');}
  if(e.key==='c'||e.key==='C')setMode('connect');
  if(e.key==='m'||e.key==='M')setMode('move');
  if(e.key==='a'||e.key==='A')setMode('add');
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();doUndo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();doRedo();}
});
